name: Feature Request
description: Suggest a new feature for FreeDF
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: Thank you for suggesting an improvement.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
